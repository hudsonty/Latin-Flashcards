<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latin Vocab</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–glass-bg: rgba(255,255,255,0.13);
–glass-border: rgba(255,255,255,0.28);
–glass-shine: rgba(255,255,255,0.35);
–glass-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.3);
–glass-shadow-hover: 0 16px 48px rgba(0,0,0,0.5), 0 4px 16px rgba(0,0,0,0.4);
–text-primary: #ffffff;
–text-secondary: rgba(255,255,255,0.65);
–text-light: rgba(255,255,255,0.4);
–green: #30d158;
–red: #ff453a;
–blue: #0a84ff;
}

body {
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 3rem 1.5rem 5rem;
font-family: ‘DM Sans’, sans-serif;
color: #ffffff;
background: #000;
overflow-x: hidden;
position: relative;
-webkit-text-fill-color: #ffffff;
}

- {
  color: inherit;
  -webkit-text-fill-color: inherit;
  }

/* Glass mixin */
.glass {
background: var(–glass-bg);
backdrop-filter: blur(28px) saturate(1.8);
-webkit-backdrop-filter: blur(28px) saturate(1.8);
border: 1px solid var(–glass-border);
box-shadow: var(–glass-shadow), inset 0 1px 0 var(–glass-shine);
border-radius: 20px;
}

/* Layout */
.content {
position: relative;
z-index: 1;
width: 100%;
max-width: 480px;
display: flex;
flex-direction: column;
align-items: center;
}

header {
width: 100%;
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 2rem;
}

header h1 {
font-family: ‘DM Serif Display’, serif;
font-size: 1.5rem;
font-weight: 400;
color: var(–text-primary);
letter-spacing: -0.01em;
}

.direction-btn {
background: rgba(255,255,255,0.1);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(255,255,255,0.2);
box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 2px 8px rgba(0,0,0,0.3);
color: var(–text-primary);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.75rem;
font-weight: 500;
padding: 0.45rem 1rem;
border-radius: 99px;
cursor: pointer;
transition: all 0.2s;
white-space: nowrap;
}

.direction-btn:hover {
background: rgba(255,255,255,0.18);
border-color: rgba(255,255,255,0.35);
}

/* Progress */
.progress-track {
width: 100%;
height: 2px;
background: rgba(255,255,255,0.1);
border-radius: 99px;
margin-bottom: 2.5rem;
overflow: hidden;
}

.progress-fill {
height: 100%;
background: linear-gradient(90deg, rgba(255,255,255,0.4), rgba(255,255,255,0.8));
border-radius: 99px;
transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
width: 0%;
box-shadow: 0 0 8px rgba(255,255,255,0.5);
}

/* Card */
.card-wrapper { width: 100%; margin-bottom: 1.25rem; }

.card {
width: 100%;
min-height: 240px;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 2.5rem 2rem;
position: relative;
transition: box-shadow 0.25s, transform 0.2s;
user-select: none;
-webkit-tap-highlight-color: transparent;
background: rgba(255,255,255,0.13);
backdrop-filter: blur(40px) saturate(1.8);
-webkit-backdrop-filter: blur(40px) saturate(1.8);
border: 1px solid rgba(255,255,255,0.28);
box-shadow: var(–glass-shadow), inset 0 1px 0 rgba(255,255,255,0.35), inset 0 -1px 0 rgba(0,0,0,0.1);
border-radius: 24px;
overflow: hidden;
}

/* Top specular highlight */
.card::before {
content: ‘’;
position: absolute;
top: 0; left: 10%; right: 10%;
height: 1px;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
border-radius: 99px;
}

/* Side refraction */
.card::after {
content: ‘’;
position: absolute;
top: 15%; bottom: 15%;
left: 0;
width: 1px;
background: linear-gradient(180deg, transparent, rgba(255,255,255,0.15), transparent);
}

.card:hover {
box-shadow: var(–glass-shadow-hover), inset 0 1px 0 rgba(255,255,255,0.3);
transform: translateY(-2px) scale(1.005);
}

.card:active { transform: translateY(0) scale(1); }

.card-side-label {
position: absolute;
top: 1.1rem;
left: 1.4rem;
font-size: 0.66rem;
font-weight: 500;
letter-spacing: 0.14em;
text-transform: uppercase;
color: var(–text-light);
}

.card-hint {
position: absolute;
bottom: 1.1rem;
right: 1.4rem;
font-size: 0.68rem;
color: var(–text-light);
font-weight: 300;
}

.card-content {
text-align: center;
transition: opacity 0.12s, transform 0.12s;
}

.card-content.hiding { opacity: 0; transform: scale(0.95); }

.word-main {
font-family: ‘DM Serif Display’, serif;
font-size: clamp(2rem, 7vw, 2.8rem);
line-height: 1.15;
color: var(–text-primary);
margin-bottom: 0.5rem;
text-shadow: 0 2px 20px rgba(255,255,255,0.1);
}

.word-main.is-latin { font-style: italic; }

.word-sub {
font-size: 0.82rem;
color: var(–text-secondary);
font-weight: 300;
font-style: italic;
font-family: ‘DM Serif Display’, serif;
}

/* Score buttons */
.score-row {
width: 100%;
display: grid;
grid-template-columns: 1fr 1fr;
gap: 0.75rem;
margin-bottom: 1.25rem;
opacity: 0;
pointer-events: none;
transform: translateY(6px);
transition: opacity 0.25s, transform 0.25s;
}

.score-row.visible { opacity: 1; pointer-events: all; transform: translateY(0); }

.score-btn {
padding: 0.75rem;
border-radius: 14px;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.85rem;
font-weight: 500;
cursor: pointer;
transition: all 0.2s;
background: rgba(255,255,255,0.07);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(255,255,255,0.15);
box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 2px 8px rgba(0,0,0,0.2);
color: var(–text-secondary);
}

.score-btn.btn-correct:hover {
background: rgba(48, 209, 88, 0.15);
border-color: rgba(48, 209, 88, 0.4);
color: var(–green);
box-shadow: inset 0 1px 0 rgba(48,209,88,0.2), 0 4px 16px rgba(48,209,88,0.15);
}

.score-btn.btn-wrong:hover {
background: rgba(255, 69, 58, 0.15);
border-color: rgba(255, 69, 58, 0.4);
color: var(–red);
box-shadow: inset 0 1px 0 rgba(255,69,58,0.2), 0 4px 16px rgba(255,69,58,0.15);
}

/* Nav */
.nav-row {
width: 100%;
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 1.5rem;
}

.nav-btn {
background: rgba(255,255,255,0.07);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(255,255,255,0.14);
box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
padding: 0.5rem 1rem;
cursor: pointer;
color: var(–text-secondary);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.85rem;
font-weight: 500;
border-radius: 10px;
transition: all 0.15s;
display: flex;
align-items: center;
gap: 0.4rem;
}

.nav-btn:hover:not(:disabled) {
background: rgba(255,255,255,0.13);
color: var(–text-primary);
border-color: rgba(255,255,255,0.25);
}

.nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

.nav-counter {
font-size: 0.82rem;
color: var(–text-secondary);
letter-spacing: 0.04em;
}

/* Bottom row */
.bottom-row {
width: 100%;
display: flex;
align-items: center;
justify-content: space-between;
gap: 0.6rem;
flex-wrap: wrap;
margin-bottom: 2rem;
}

.stats-mini {
display: flex;
gap: 1.2rem;
font-size: 0.78rem;
color: var(–text-secondary);
}

.stat-item { display: flex; align-items: center; gap: 0.4rem; }
.stat-dot {
width: 8px; height: 8px;
border-radius: 50%;
flex-shrink: 0;
}
.stat-dot.green {
background: #30d158;
box-shadow: 0 0 8px 2px #30d158, 0 0 16px #30d158;
}
.stat-dot.red {
background: #ff453a;
box-shadow: 0 0 8px 2px #ff453a, 0 0 16px #ff453a;
}

.action-btn {
background: rgba(255,255,255,0.07);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border: 1px solid rgba(255,255,255,0.14);
box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
color: var(–text-secondary);
font-family: ‘DM Sans’, sans-serif;
font-size: 0.8rem;
font-weight: 500;
padding: 0.45rem 0.9rem;
border-radius: 10px;
cursor: pointer;
transition: all 0.2s;
display: flex;
align-items: center;
gap: 0.35rem;
}

.action-btn:hover {
background: rgba(255,255,255,0.13);
border-color: rgba(255,255,255,0.25);
color: var(–text-primary);
}

.action-btn.active {
background: rgba(255, 69, 58, 0.15);
border-color: rgba(255, 69, 58, 0.4);
color: var(–red);
box-shadow: inset 0 1px 0 rgba(255,69,58,0.2), 0 4px 16px rgba(255,69,58,0.1);
}

.action-btn.active:hover {
background: rgba(255, 69, 58, 0.22);
}

/* List toggle */
.list-toggle {
background: none;
border: none;
font-family: ‘DM Sans’, sans-serif;
font-size: 0.75rem;
color: var(–text-light);
cursor: pointer;
letter-spacing: 0.08em;
text-transform: uppercase;
padding: 0;
margin-bottom: 1rem;
transition: color 0.15s;
}

.list-toggle:hover { color: var(–text-secondary); }

/* Word list */
.word-list {
display: none;
width: 100%;
background: rgba(255,255,255,0.06);
backdrop-filter: blur(30px);
-webkit-backdrop-filter: blur(30px);
border: 1px solid rgba(255,255,255,0.14);
box-shadow: var(–glass-shadow), inset 0 1px 0 rgba(255,255,255,0.15);
border-radius: 16px;
overflow: hidden;
}

.word-list.open { display: block; }

.word-list table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }

.word-list th {
padding: 0.7rem 1.1rem;
text-align: left;
font-weight: 500;
font-size: 0.68rem;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–text-light);
border-bottom: 1px solid rgba(255,255,255,0.08);
}

.word-list td {
padding: 0.6rem 1.1rem;
border-bottom: 1px solid rgba(255,255,255,0.06);
color: var(–text-primary);
}

.word-list tr:last-child td { border-bottom: none; }
.word-list tr:hover td { background: rgba(255,255,255,0.04); }

.word-list td:first-child {
font-family: ‘DM Serif Display’, serif;
font-style: italic;
font-size: 0.95rem;
}

.pill {
display: inline-flex;
align-items: center;
font-size: 0.68rem;
font-weight: 500;
padding: 0.2rem 0.55rem;
border-radius: 99px;
}

.pill.known  { background: rgba(48,209,88,0.15);  color: var(–green); border: 1px solid rgba(48,209,88,0.3); }
.pill.review { background: rgba(255,69,58,0.15);  color: var(–red);   border: 1px solid rgba(255,69,58,0.3); }
.pill.unseen { background: rgba(255,255,255,0.05); color: var(–text-light); border: 1px solid rgba(255,255,255,0.1); }

@keyframes fade-up {
from { opacity: 0; transform: translateY(10px); }
to   { opacity: 1; transform: translateY(0); }
}
.entering { animation: fade-up 0.2s ease both; }
</style>

</head>
<body>

<div class="content">

  <header>
    <h1>Vocabula Latina</h1>
    <button class="direction-btn" id="directionBtn" onclick="toggleDirection()">Latin → English</button>
  </header>

  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <div class="card-wrapper">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-side-label" id="sideLabel">Latin</div>
      <div class="card-content" id="cardContent">
        <div class="word-main is-latin" id="wordMain">—</div>
        <div class="word-sub" id="wordSub"></div>
      </div>
      <div class="card-hint" id="cardHint">tap to reveal</div>
    </div>
  </div>

  <div class="score-row" id="scoreRow">
    <button class="score-btn btn-wrong" onclick="markCard(false)">Still learning</button>
    <button class="score-btn btn-correct" onclick="markCard(true)">Got it ✓</button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn" onclick="prevCard()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Prev
    </button>
    <div class="nav-counter" id="counter">1 / 19</div>
    <button class="nav-btn" id="nextBtn" onclick="nextCard()">
      Next
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2L10 7L5 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="bottom-row">
    <div class="stats-mini">
      <div class="stat-item"><div class="stat-dot green"></div><span id="knownCount">0</span> known</div>
      <div class="stat-item"><div class="stat-dot red"></div><span id="reviewCount">0</span> review</div>
    </div>
    <button class="action-btn" onclick="shuffleCards()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M1 4h7.5M1 9h7.5M9 2l3 2-3 2M9 7l3 2-3 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Shuffle
    </button>
    <button class="action-btn" id="reviewModeBtn" onclick="toggleReviewMode()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1a5.5 5.5 0 100 11A5.5 5.5 0 006.5 1zM6.5 4v3l2 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Review weak
    </button>
    <button class="action-btn" onclick="resetProgress()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5a4.5 4.5 0 014.5-4.5A4.5 4.5 0 0111 6.5M2 6.5l-1.5-1.5M2 6.5L.5 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Reset
    </button>
  </div>

<button class="list-toggle" onclick="toggleList()" id="listToggle">All words ↓</button>

  <div class="word-list" id="wordList">
    <table>
      <thead><tr><th>Latin</th><th>English</th><th>Status</th></tr></thead>
      <tbody id="wordListBody"></tbody>
    </table>
  </div>

</div>

<script>
const vocab = [
  { latin: "in palaеstrā",        english: "in the palaestra, in the exercise area" },
  { latin: "discum",              english: "discus" },
  { latin: "thermās",             english: "baths" },
  { latin: "ferēbat",             english: "was carrying" },
  { latin: "āthlētās",            english: "athletes" },
  { latin: "statuās",             english: "statues" },
  { latin: "posuērunt",           english: "have put up" },
  { latin: "porticus",            english: "colonnade" },
  { latin: "offerēbant",          english: "were offering" },
  { latin: "in mediā turbā",      english: "in the middle of the crowd" },
  { latin: "āthlēta ille",        english: "that athlete" },
  { latin: "novum",               english: "new" },
  { latin: "longē",               english: "a long way, far" },
  { latin: "per aurās ēvolāvit",  english: "flew through the air" },
  { latin: "invēnit",             english: "found" },
  { latin: "rediit",              english: "went back" },
  { latin: "nōn accēpit",         english: "did not accept" },
  { latin: "trādidit",            english: "handed over" },
  { latin: "nāsum frāctum",       english: "a broken nose" },
];

let deck = [...vocab];
let current = 0;
let isFlipped = false;
let statuses = JSON.parse(localStorage.getItem('latin-statuses') || '{}');
let latinFirst = localStorage.getItem('latin-direction') !== 'false';
let reviewMode = false;

function saveStatuses() {
  localStorage.setItem('latin-statuses', JSON.stringify(statuses));
}

function toggleReviewMode() {
  const weak = vocab.filter(w => statuses[w.latin] === 'review');
  if (!reviewMode) {
    if (weak.length === 0) {
      alert('No words marked as "Still learning" yet. Mark some cards first!');
      return;
    }
    reviewMode = true;
    deck = [...weak];
    document.getElementById('reviewModeBtn').classList.add('active');
    document.getElementById('reviewModeBtn').innerHTML = `
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 2l9 9M11 2l-9 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Exit review`;
  } else {
    reviewMode = false;
    deck = [...vocab];
    document.getElementById('reviewModeBtn').classList.remove('active');
    document.getElementById('reviewModeBtn').innerHTML = `
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1a5.5 5.5 0 100 11A5.5 5.5 0 006.5 1zM6.5 4v3l2 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Review weak`;
  }
  current = 0;
  render(true);
}

function resetProgress() {
  statuses = {};
  saveStatuses();
  reviewMode = false;
  deck = [...vocab];
  current = 0;
  document.getElementById('reviewModeBtn').classList.remove('active');
  document.getElementById('reviewModeBtn').innerHTML = `
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1a5.5 5.5 0 100 11A5.5 5.5 0 006.5 1zM6.5 4v3l2 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Review weak`;
  render(true);
}

function toggleDirection() {
  latinFirst = !latinFirst;
  localStorage.setItem('latin-direction', latinFirst);
  document.getElementById('directionBtn').textContent = latinFirst ? 'Latin → English' : 'English → Latin';
  render(false);
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function applyContent(latin, english, flipped) {
  const main    = document.getElementById('wordMain');
  const sub     = document.getElementById('wordSub');
  const label   = document.getElementById('sideLabel');
  const hint    = document.getElementById('cardHint');
  const content = document.getElementById('cardContent');

  const showLatinFirst = latinFirst ? !flipped : flipped;

  if (showLatinFirst) {
    label.textContent = 'Latin';
    main.textContent = latin;
    main.className = 'word-main is-latin';
    sub.textContent = flipped ? english : '';
    hint.style.display = flipped ? 'none' : '';
    if (!flipped) hint.textContent = 'tap to reveal';
  } else {
    label.textContent = 'English';
    main.textContent = english;
    main.className = 'word-main';
    sub.textContent = flipped ? latin : '';
    hint.style.display = flipped ? 'none' : '';
    if (!flipped) hint.textContent = 'tap to reveal';
  }

  content.classList.remove('entering');
  void content.offsetWidth;
  content.classList.add('entering');
}

function transitionContent(latin, english, flipped) {
  const content = document.getElementById('cardContent');
  content.classList.add('hiding');
  setTimeout(() => {
    content.classList.remove('hiding');
    applyContent(latin, english, flipped);
  }, 130);
}

function render(animate) {
  const w = deck[current];
  isFlipped = false;
  document.getElementById('scoreRow').classList.remove('visible');
  document.getElementById('counter').textContent = `${current + 1} / ${deck.length}`;
  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === deck.length - 1;

  if (animate) {
    transitionContent(w.latin, w.english, false);
  } else {
    applyContent(w.latin, w.english, false);
  }

  updateStats();
  renderWordList();
  updateProgress();
}

function flipCard() {
  const w = deck[current];
  isFlipped = !isFlipped;
  transitionContent(w.latin, w.english, isFlipped);
  if (isFlipped) {
    document.getElementById('scoreRow').classList.add('visible');
  } else {
    document.getElementById('scoreRow').classList.remove('visible');
  }
}

function nextCard() { if (current < deck.length - 1) { current++; render(true); } }
function prevCard() { if (current > 0) { current--; render(true); } }
function shuffleCards() { shuffle(deck); current = 0; render(true); }

function markCard(known) {
  statuses[deck[current].latin] = known ? 'known' : 'review';
  saveStatuses();
  updateStats(); renderWordList(); updateProgress();
  setTimeout(() => { if (current < deck.length - 1) nextCard(); }, 200);
}

function updateStats() {
  document.getElementById('knownCount').textContent = Object.values(statuses).filter(v => v === 'known').length;
  document.getElementById('reviewCount').textContent = Object.values(statuses).filter(v => v === 'review').length;
}

function updateProgress() {
  document.getElementById('progressFill').style.width = (Object.keys(statuses).length / deck.length * 100) + '%';
}

function renderWordList() {
  document.getElementById('wordListBody').innerHTML = vocab.map(w => {
    const s = statuses[w.latin];
    const cls = s === 'known' ? 'known' : s === 'review' ? 'review' : 'unseen';
    const lbl = s === 'known' ? '✓ Known' : s === 'review' ? '↻ Review' : '—';
    return `<tr><td>${w.latin}</td><td>${w.english}</td><td><span class="pill ${cls}">${lbl}</span></td></tr>`;
  }).join('');
}

function toggleList() {
  const list = document.getElementById('wordList');
  const btn = document.getElementById('listToggle');
  list.classList.toggle('open');
  btn.textContent = list.classList.contains('open') ? 'All words ↑' : 'All words ↓';
}

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === 'y' || e.key === 'Y') { if (isFlipped) markCard(true); }
  if (e.key === 'n' || e.key === 'N') { if (isFlipped) markCard(false); }
});

document.getElementById('directionBtn').textContent = latinFirst ? 'Latin → English' : 'English → Latin';
render(false);
</script>

</body>
</html>
